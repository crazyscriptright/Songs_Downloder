name: CI Checks

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  backend-prepush-checks:
    name: Backend pre-push checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run backend pre-push script
        run: python scripts/pre_push_backend.py

      - name: Run tools pre-push script
        run: python tools/music_metadata_enhancer/pre_push.py

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: spotiflac-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build frontend
        run: npm run build
