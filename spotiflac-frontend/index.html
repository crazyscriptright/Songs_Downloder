    <!-- Preload background textures for instant display -->
    <script>
      // Apply theme + preload correct background images before first paint
      (function () {
        var theme = localStorage.getItem("theme");
        var isLight = theme === "light";
        if (isLight) {
          document.documentElement.classList.add("light-theme");
          document.body && document.body.classList.add("light-theme");
        }
        // Preload only the active theme's backgrounds
        var isMobile = window.innerWidth <= 768;
        var bg = isLight
          ? isMobile
            ? "/mobile_light.webp"
            : "/light.webp"
          : isMobile
            ? "/mobile_dark.webp"
            : "/dark.webp";
        var link = document.createElement("link");
        link.rel = "preload";
        link.as = "image";
        link.type = "image/webp";
        link.href = bg;
        document.head.appendChild(link);
      })();
    </script>
