<!-- This file is intentionally left in public/ as a static fallback.
     The actual index.html used by Vite is at the project root. -->

    <div class="container">
      <div class="header">
        <button class="theme-toggle" id="themeToggle">🌓 Theme</button>
        <h1>
          <svg
            width="32"
            height="32"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            style="display: inline-block; margin-right: 10px"
          >
            <circle cx="12" cy="12" r="3"></circle>
            <path d="M12 1v6m0 6v6m11-7h-6m-6 0H1"></path>
          </svg>
          Universal Music Downloader
        </h1>
        <p>
          Download high-quality music from YouTube, SoundCloud, JioSaavn &amp; more
          <br />
          <a
            href="bulk.html"
            style="
              color: var(--accent-color);
              text-decoration: none;
              font-weight: 600;
              margin-top: 10px;
              display: inline-block;
            "
          >
            Bulk &amp; Playlist Downloader →
          </a>
        </p>
      </div>

      <!-- Search Box -->
      <div class="search-box">
        <div class="search-type-selector">
          <button class="type-btn active" data-type="music">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 18V5l12-2v13"></path>
              <circle cx="6" cy="18" r="3"></circle>
              <circle cx="18" cy="16" r="3"></circle>
            </svg>
            Music
          </button>
          <button class="type-btn" data-type="video">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="23 7 16 12 23 17 23 7"></polygon>
              <rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect>
            </svg>
            Videos
          </button>
          <button class="type-btn" data-type="all">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"></circle>
              <line x1="2" y1="12" x2="22" y2="12"></line>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
            </svg>
            All Sources
          </button>
        </div>

        <div class="search-input-group" style="position: relative">
          <input
            type="text"
            id="searchInput"
            placeholder="Enter song name, artist, or paste URL..."
            autocomplete="off"
          />
          <div id="searchSuggestions" class="search-suggestions"></div>
          <button id="searchBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"></circle>
              <path d="m21 21-4.35-4.35"></path>
            </svg>
            Search
          </button>
        </div>

        <div id="queryHint" class="query-hint">
          <svg
            width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            style="display: inline-block; margin-right: 5px"
          >
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
            <line x1="12" y1="17" x2="12.01" y2="17"></line>
          </svg>
          Search by name or paste a music URL (YouTube, SoundCloud, JioSaavn etc.)
        </div>
      </div>

      <!-- Status -->
      <div id="status" class="status"></div>

      <!-- Source Navigation -->
      <div id="sourceNavigation" class="source-navigation"></div>

      <!-- Results -->
      <div id="results" class="results-container"></div>

      <!-- Download Manager -->
      <div id="downloadManager" class="download-manager">
        <div class="download-manager-header">
          <h3>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
              <polyline points="7,10 12,15 17,10"></polyline>
              <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Downloads
          </h3>
          <div class="download-manager-controls">
            <select id="downloadFilter">
              <option value="all">All</option>
              <option value="downloading">Downloading</option>
              <option value="queued">Queued</option>
              <option value="complete">Complete</option>
              <option value="error">Failed</option>
            </select>
            <button id="clearFinished" title="Clear Finished">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="3,6 5,6 21,6"></polyline>
                <path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6M8,6V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"></path>
              </svg>
            </button>
            <button id="closeDownloadManager" title="Close">&times;</button>
          </div>
        </div>
        <div id="downloadList" class="download-list">
          <div style="padding: 20px; text-align: center; color: var(--text-secondary)">
            No downloads yet
          </div>
        </div>
      </div>

      <!-- Download Manager Toggle Button -->
      <button id="downloadToggle" class="download-manager-toggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="7,10 12,15 17,10"></polyline>
          <line x1="12" y1="15" x2="12" y2="3"></line>
        </svg>
        <span id="downloadBadge" class="badge" style="display: none">0</span>
      </button>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
