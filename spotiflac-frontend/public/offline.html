<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — Universal Music Downloader</title>
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap");

      /* ── Light theme (default) ── */
      :root {
        --bg: #f1ebdd;
        --bg-card: #faf6ee;
        --text: #1b2021;
        --text-sub: #51513d;
        --accent: #51513d;
        --accent2: #a6a867;
        --border: #d8cfb2;
        --shadow: rgba(81, 81, 61, 0.18);
      }

      /* ── Dark theme ── */
      .dark {
        --bg: #1a1714;
        --bg-card: #2d271f;
        --text: #e3dcc2;
        --text-sub: #a6a867;
        --accent: #a6a867;
        --accent2: #e3dc95;
        --border: #4a4231;
        --shadow: rgba(166, 168, 103, 0.18);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        text-align: center;
        transition:
          background 0.3s,
          color 0.3s;
      }

      .offline-card {
        background: var(--bg-card);
        border: 2px solid var(--border);
        border-radius: 24px;
        padding: 50px 40px;
        max-width: 480px;
        width: 100%;
        box-shadow: 0 12px 40px var(--shadow);
      }

      /* ── Vinyl record animation ── */
      .vinyl-container {
        position: relative;
        width: 140px;
        height: 140px;
        margin: 0 auto 30px;
      }

      .vinyl {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background:
          radial-gradient(circle at center, var(--accent2) 8%, transparent 9%),
          radial-gradient(circle at center, var(--border) 12%, transparent 13%),
          radial-gradient(
            circle at center,
            transparent 30%,
            var(--border) 30.5%,
            transparent 31%
          ),
          radial-gradient(
            circle at center,
            transparent 45%,
            var(--border) 45.5%,
            transparent 46%
          ),
          radial-gradient(
            circle at center,
            transparent 60%,
            var(--border) 60.5%,
            transparent 61%
          ),
          conic-gradient(
            from 0deg,
            #2a251c,
            #3a3428,
            #2a251c,
            #3a3428,
            #2a251c,
            #3a3428,
            #2a251c
          );
        animation: spin-vinyl 4s linear infinite;
        animation-play-state: paused;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }

      .dark .vinyl {
        background:
          radial-gradient(circle at center, var(--accent2) 8%, transparent 9%),
          radial-gradient(circle at center, var(--border) 12%, transparent 13%),
          radial-gradient(
            circle at center,
            transparent 30%,
            var(--border) 30.5%,
            transparent 31%
          ),
          radial-gradient(
            circle at center,
            transparent 45%,
            var(--border) 45.5%,
            transparent 46%
          ),
          radial-gradient(
            circle at center,
            transparent 60%,
            var(--border) 60.5%,
            transparent 61%
          ),
          conic-gradient(
            from 0deg,
            #1a1714,
            #2d271f,
            #1a1714,
            #2d271f,
            #1a1714,
            #2d271f,
            #1a1714
          );
      }

      /* Tonearm */
      .tonearm {
        position: absolute;
        top: -10px;
        right: -10px;
        width: 50px;
        height: 4px;
        background: var(--accent);
        border-radius: 2px;
        transform-origin: right center;
        transform: rotate(-30deg);
        transition: transform 0.6s ease;
      }
      .tonearm::before {
        content: "";
        position: absolute;
        right: -4px;
        top: -4px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--accent);
      }
      .tonearm::after {
        content: "";
        position: absolute;
        left: -2px;
        top: -1px;
        width: 8px;
        height: 6px;
        background: var(--accent2);
        border-radius: 1px;
      }

      /* When online — spin the vinyl and drop the needle */
      .online .vinyl {
        animation-play-state: running;
      }
      .online .tonearm {
        transform: rotate(-10deg);
      }

      @keyframes spin-vinyl {
        from {
          transform: rotate(0deg);
        }
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Broken cable icon (no-connection indicator) ── */
      .no-signal {
        display: inline-block;
        margin-bottom: 8px;
        opacity: 0.6;
      }
      .online .no-signal {
        display: none;
      }

      h1 {
        font-family: "Playfair Display", Georgia, serif;
        font-size: 1.8em;
        color: var(--accent);
        margin-bottom: 12px;
      }

      .subtitle {
        color: var(--text-sub);
        font-size: 1.05em;
        line-height: 1.6;
        margin-bottom: 28px;
      }

      .retry-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 32px;
        font-size: 1em;
        font-weight: 600;
        font-family: inherit;
        background: linear-gradient(
          135deg,
          var(--accent) 0%,
          var(--accent2) 100%
        );
        color: var(--bg);
        border: none;
        border-radius: 14px;
        cursor: pointer;
        transition:
          transform 0.2s,
          box-shadow 0.2s;
      }
      .retry-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px var(--shadow);
      }
      .retry-btn:active {
        transform: translateY(0);
      }

      .retry-btn svg {
        transition: transform 0.4s;
      }
      .retry-btn:hover svg {
        transform: rotate(180deg);
      }

      .status-dot {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #8b3a3a;
        margin-right: 6px;
        animation: pulse-dot 2s ease infinite;
      }
      .online .status-dot {
        background: #5c7a3e;
        animation: none;
      }

      @keyframes pulse-dot {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .status-text {
        font-size: 0.85em;
        color: var(--text-sub);
        margin-top: 20px;
      }

      /* Reconnecting banner */
      .reconnecting {
        display: none;
        margin-top: 16px;
        padding: 10px 20px;
        background: rgba(166, 168, 103, 0.12);
        border: 1px solid rgba(166, 168, 103, 0.35);
        border-radius: 10px;
        font-size: 0.9em;
        color: var(--accent2);
      }
      .online .reconnecting {
        display: none !important;
      }

      @media (max-width: 480px) {
        .offline-card {
          padding: 35px 24px;
        }
        h1 {
          font-size: 1.5em;
        }
        .vinyl-container {
          width: 110px;
          height: 110px;
        }
        .vinyl {
          width: 110px;
          height: 110px;
        }
      }
    </style>
  </head>
  <body>
    <div class="offline-card" id="card">
      <div class="vinyl-container">
        <div class="vinyl"></div>
        <div class="tonearm"></div>
      </div>

      <svg
        class="no-signal"
        width="48"
        height="48"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <line x1="1" y1="1" x2="23" y2="23"></line>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
        <line x1="12" y1="20" x2="12.01" y2="20"></line>
      </svg>

      <h1>You're Offline</h1>
      <p class="subtitle">
        The music will be back once you're connected again.<br />
        Check your Wi-Fi or mobile data and try again.
      </p>

      <button class="retry-btn" onclick="tryReconnect()">
        <svg
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Retry
      </button>

      <div class="status-text">
        <span class="status-dot"></span>
        <span id="statusLabel">No connection</span>
      </div>

      <div class="reconnecting" id="reconnecting">Reconnecting...</div>
    </div>

    <script>
      // Apply saved theme
      (function () {
        var theme = localStorage.getItem("theme");
        if (theme !== "light") document.body.classList.add("dark");
      })();

      function tryReconnect() {
        document.getElementById("reconnecting").style.display = "block";
        // Probe the root to see if we're back online
        fetch("/?_sw_check=" + Date.now(), { cache: "no-store" })
          .then(function (r) {
            if (r.ok || r.status === 304) {
              window.location.replace("/");
            } else {
              showStillOffline();
            }
          })
          .catch(function () {
            showStillOffline();
          });
      }

      function showStillOffline() {
        document.getElementById("reconnecting").style.display = "none";
      }

      // Auto-detect when browser goes back online
      window.addEventListener("online", function () {
        document.getElementById("card").classList.add("online");
        document.getElementById("statusLabel").textContent =
          "Back online — reloading...";
        setTimeout(function () {
          window.location.replace("/");
        }, 1200);
      });

      window.addEventListener("offline", function () {
        document.getElementById("card").classList.remove("online");
        document.getElementById("statusLabel").textContent = "No connection";
      });

      // If already online when page loads (e.g. cached navigation)
      if (navigator.onLine) {
        window.location.replace("/");
      }
    </script>
  </body>
</html>
